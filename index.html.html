// ── Lightweight SVG chart components (no external deps) ──
function ResponsiveContainer({ width, height, children }) {
  const ref = React.useRef(null);
  const [w, setW] = React.useState(300);
  React.useEffect(() => {
    if (!ref.current) return;
    const ro = new ResizeObserver(e => setW(e[0].contentRect.width));
    ro.observe(ref.current);
    return () => ro.disconnect();
  }, []);
  const child = React.Children.only(children);
  return React.createElement('div', { ref, style: { width: width||'100%', height } },
    React.cloneElement(child, { width: w, height }));
}
function LineChart({ data, children, width, height, margin }) {
  const m = margin || { top:5, right:5, left:5, bottom:5 };
  const iw = (width||300) - m.left - m.right;
  const ih = (height||200) - m.top - m.bottom;
  return React.createElement('svg', { width, height },
    React.createElement('g', { transform: `translate(${m.left},${m.top})` },
      React.Children.map(children, c => c ? React.cloneElement(c, { data, iw, ih }) : null)
    )
  );
}
function CartesianGrid({ iw, ih }) {
  const lines = [];
  for (let i = 0; i <= 4; i++) {
    const y = (ih / 4) * i;
    lines.push(React.createElement('line', { key: i, x1: 0, y1: y, x2: iw, y2: y, stroke: '#ffffff0d', strokeDasharray: '3 3' }));
  }
  return React.createElement('g', null, ...lines);
}
function XAxis({ data, iw, ih, dataKey }) {
  if (!data || data.length < 2) return null;
  const step = iw / (data.length - 1);
  return React.createElement('g', null,
    data.map((d, i) => React.createElement('text', {
      key: i, x: i * step, y: ih + 14,
      fill: '#888', fontSize: 10, textAnchor: 'middle'
    }, d[dataKey]))
  );
}
function YAxis({ data, iw, ih, dataKey }) { return null; }
function ReferenceLine() { return null; }
function Tooltip() { return null; }
function Line({ data, dataKey, stroke, strokeWidth, dot, iw, ih }) {
  if (!data || data.length < 2) return null;
  const vals = data.map(d => parseFloat(d[dataKey]) || 0);
  const min = Math.min(...vals);
  const max = Math.max(...vals);
  const range = max - min || 1;
  const step = iw / (data.length - 1);
  const pts = vals.map((v, i) => `${i * step},${ih - ((v - min) / range) * ih * 0.9}`).join(' ');
  const elements = [React.createElement('polyline', {
    key: 'line', points: pts, fill: 'none',
    stroke: stroke || '#f97316', strokeWidth: strokeWidth || 2,
    strokeLinejoin: 'round', strokeLinecap: 'round'
  })];
  if (dot !== false) {
    vals.forEach((v, i) => {
      elements.push(React.createElement('circle', {
        key: 'dot'+i,
        cx: i * step,
        cy: ih - ((v - min) / range) * ih * 0.9,
        r: 4, fill: stroke || '#f97316'
      }));
    });
  }
  return React.createElement('g', null, ...elements);
}

const TRIAL_DAYS = 7;
const maxWeightFn = (e) => Math.max(...e.setDetails.map((s) => s.weight));
const totalVolumeFn = (e) => e.setDetails.reduce((s, x) => s + x.reps * x.weight, 0);
const formatDate = (d) => { const [, m, day] = d.split("-"); return `${day}.${m}`; };
const today = () => new Date().toISOString().split("T")[0];

// Level system: XP from weight PRs and body changes
const LEVELS = [
  { level: 1, title: "Новичок",    xpNeeded: 0,    color: "#64748b" },
  { level: 2, title: "Атлет",      xpNeeded: 100,  color: "#22c55e" },
  { level: 3, title: "Боец",       xpNeeded: 250,  color: "#3b82f6" },
  { level: 4, title: "Мастер",     xpNeeded: 500,  color: "#a855f7" },
  { level: 5, title: "Легенда",    xpNeeded: 1000, color: "#f59e0b" },
];

function calcXP(exercises, bodyLogs) {
  let xp = 0;
  // 1 XP per kg of max weight across all exercises
  const byName = {};
  exercises.forEach((e) => {
    const w = maxWeightFn(e);
    if (!byName[e.name] || w > byName[e.name]) byName[e.name] = w;
  });
  Object.values(byName).forEach((w) => { xp += Math.floor(w); });
  // 20 XP per body log entry
  xp += bodyLogs.length * 20;
  return xp;
}

function getLevelInfo(xp) {
  let current = LEVELS[0];
  let next = LEVELS[1];
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (xp >= LEVELS[i].xpNeeded) { current = LEVELS[i]; next = LEVELS[i + 1] || null; break; }
  }
  const progress = next ? Math.min(1, (xp - current.xpNeeded) / (next.xpNeeded - current.xpNeeded)) : 1;
  return { current, next, progress, xp };
}

// ─────────────────────────────────────────────
// SWIPEABLE CARD (swipe left → reveal delete)
// ─────────────────────────────────────────────
const SWIPE_THRESHOLD = 60;  // px to trigger open
const DELETE_WIDTH    = 72;  // px of red zone

function SwipeableCard({ onDelete, children }) {
  const [offset, setOffset] = useState(0);
  const [open, setOpen] = useState(false);
  const [isDragging, setIsDragging] = useState(false);
  const startX = useRef(null);
  const startY = useRef(null);
  const locked = useRef(null); // "h" | "v" | null

  const clamp = (v) => Math.max(-DELETE_WIDTH, Math.min(0, v));
  const base = () => open ? -DELETE_WIDTH : 0;

  // ── TOUCH ──
  const onTouchStart = (e) => {
    startX.current = e.touches[0].clientX;
    startY.current = e.touches[0].clientY;
    locked.current = null;
    setIsDragging(true);
  };

  const onTouchMove = (e) => {
    if (startX.current === null) return;
    const dx = e.touches[0].clientX - startX.current;
    const dy = e.touches[0].clientY - startY.current;
    if (!locked.current) {
      if (Math.abs(dx) > Math.abs(dy) + 4) locked.current = "h";
      else if (Math.abs(dy) > Math.abs(dx) + 4) locked.current = "v";
      else return;
    }
    if (locked.current === "v") return;
    setOffset(clamp(base() + dx));
  };

  const onTouchEnd = () => {
    setIsDragging(false);
    startX.current = null;
    if (locked.current !== "h") return;
    if (!open && offset < -SWIPE_THRESHOLD) { setOffset(-DELETE_WIDTH); setOpen(true); }
    else { setOffset(0); setOpen(false); }
    locked.current = null;
  };

  // ── MOUSE (desktop) ──
  const onMouseDown = (e) => {
    startX.current = e.clientX;
    startY.current = e.clientY;
    locked.current = null;
    setIsDragging(true);
    const onMove = (ev) => {
      const dx = ev.clientX - startX.current;
      const dy = ev.clientY - startY.current;
      if (!locked.current) {
        if (Math.abs(dx) > Math.abs(dy) + 4) locked.current = "h";
        else if (Math.abs(dy) > Math.abs(dx) + 4) locked.current = "v";
        else return;
      }
      if (locked.current === "v") return;
      setOffset(clamp(base() + dx));
    };
    const onUp = () => {
      setIsDragging(false);
      startX.current = null;
      if (locked.current === "h") {
        if (!open && offset < -SWIPE_THRESHOLD) { setOffset(-DELETE_WIDTH); setOpen(true); }
        else { setOffset(0); setOpen(false); }
      }
      locked.current = null;
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  };

  const onContentClick = (e) => {
    if (open) { e.stopPropagation(); setOffset(0); setOpen(false); }
  };

  return (
    <div style={{ position: "relative", marginBottom: 10, overflow: "hidden", borderRadius: 16, touchAction: "pan-y" }}>
      {/* Delete background */}
      <div style={{
        position: "absolute", inset: 0,

// EXERCISE DETAIL MODAL (add new session + chart)
// ─────────────────────────────────────────────
function ExerciseDetailModal({ name, exercises, onClose, onAddSession }) {
  const [tab, setTab] = useState("add");
  const [formDate, setFormDate] = useState(today());
  const [numSets, setNumSets] = useState(3);
  const [setDetails, setSetDetails] = useState(Array.from({ length: 3 }, () => ({ reps: "", weight: "" })));
  const [saved, setSaved] = useState(false);

  const changeNumSets = (n) => {
    const count = Math.max(1, Math.min(10, n));
    setNumSets(count);
    setSetDetails((prev) => Array.from({ length: count }, (_, i) => prev[i] || { reps: "", weight: "" }));
  };
  const updateSet = (i, field, val) =>
    setSetDetails((prev) => prev.map((s, idx) => idx === i ? { ...s, [field]: val } : s));

  const handleSave = () => {
    if (!formDate) return;
    const details = setDetails.map((s) => ({ reps: parseInt(s.reps) || 0, weight: parseFloat(s.weight) || 0 }));
    onAddSession({ id: Date.now(), name, date: formDate, setDetails: details });
    setSaved(true);
    setTimeout(() => setSaved(false), 1500);
    setSetDetails(Array.from({ length: numSets }, () => ({ reps: "", weight: "" })));
  };

  const data = useMemo(() =>
    exercises.filter((e) => e.name === name)
      .sort((a, b) => a.date.localeCompare(b.date))
      .map((e) => ({ date: formatDate(e.date), maxWeight: maxWeightFn(e), volume: totalVolumeFn(e) })),
    [exercises, name]
  );

  const { diff, record, sortedHistory } = useMemo(() => {
    const diff = data.length > 1 ? +(data[data.length - 1].maxWeight - data[0].maxWeight).toFixed(1) : 0;
    const record = data.length ? Math.max(...data.map((d) => d.maxWeight)) : 0;
    const sortedHistory = exercises
      .filter((e) => e.name === name)
      .sort((a, b) => b.date.localeCompare(a.date));
    return { diff, record, sortedHistory };
  }, [data, exercises, name]);

  return (
    <div style={S.overlay} onClick={onClose}>
      <div style={{ ...S.modal, paddingBottom: 36 }} onClick={(e) => e.stopPropagation()}>
        <div style={S.modalHandle} />

        {/* Header */}
        <div style={S.modalHeader}>
          <div>
            <p style={S.modalTitle}>{name}</p>
            <p style={S.modalSub}>{data.length} {data.length === 1 ? "запись" : "записей"}</p>
          </div>
          <button style={S.closeBtn} onClick={onClose}>✕</button>
        </div>

        {/* Modal tabs */}
        <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
          <button style={{ ...S.tab, flex: 1, ...(tab === "add" ? S.tabActive : {}) }} onClick={() => setTab("add")}>
            ➕ Добавить
          </button>
          <button style={{ ...S.tab, flex: 1, ...(tab === "chart" ? S.tabActive : {}) }} onClick={() => setTab("chart")}>
            📈 График
          </button>
        </div>

        {/* ── ADD TAB */}
        {tab === "add" && (
          <>
            {/* Date picker */}
            <div style={{ ...S.fieldGroup, marginBottom: 12 }}>
              <label style={S.label}>📅 Дата тренировки</label>
              <input
                style={{ ...S.input, fontSize: 15 }}
                type="date"
                value={formDate}
                onChange={(e) => setFormDate(e.target.value)}
              />
            </div>

            {/* Sets stepper */}
            <div style={{ ...S.fieldGroup, marginBottom: 10 }}>
              <label style={S.label}>Количество подходов</label>
              <div style={S.stepperRow}>
                <button style={S.stepBtn} onClick={() => changeNumSets(numSets - 1)}>−</button>
                <span style={S.stepVal}>{numSets}</span>
                <button style={S.stepBtn} onClick={() => changeNumSets(numSets + 1)}>+</button>
              </div>
            </div>

            {/* Column headers */}
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
              <div style={{ width: 26, minWidth: 26, maxWidth: 26, flexShrink: 0 }} />
              <div style={{ flex: 1, textAlign: "center", fontSize: 10, color: "#64748b", fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase" }}>Вес (кг)</div>
              <div style={{ flex: 1, textAlign: "center", fontSize: 10, color: "#64748b", fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase" }}>Повторения</div>
            </div>

            {setDetails.map((s, i) => (
              <div key={i} style={S.setRow}>
                <div style={S.setNumBadge}>{i + 1}</div>
                <input style={S.setInput} type="number" inputMode="decimal" placeholder="80" value={s.weight} onChange={(e) => updateSet(i, "weight", e.target.value)} />
                <input style={S.setInput} type="number" inputMode="numeric" placeholder="10" value={s.reps} onChange={(e) => updateSet(i, "reps", e.target.value)} />
              </div>
            ))}

            <button style={{ ...S.saveBtn, marginTop: 12 }} onClick={handleSave}>
              {saved ? "✓ Сохранено!" : "Сохранить"}
            </button>

            {/* Recent sessions */}
            {data.length > 0 && (
              <>
                <p style={{ ...S.chartLabel, marginTop: 16 }}>Последние записи</p>
                {sortedHistory.slice(0, 3).map((e) => (
                    <div key={e.id} style={S.sessionRow}>
                      <span style={S.sessionDate}>{e.date}</span>
                      <div style={S.sessionSets}>
                        {e.setDetails.map((s, i) => (
                          <span key={i} style={S.sessionChip}>
                            <span style={{ color: "#6366f1", fontWeight: 700 }}>П{i + 1}</span> {s.weight}кг×{s.reps}
                          </span>
                        ))}
                      </div>
                    </div>
                  ))}
              </>
            )}
          </>
        )}

        {/* ── CHART TAB */}
        {tab === "chart" && (
          <>
            {data.length < 2 ? (
              <div style={{ textAlign: "center", padding: "32px 0", color: "#64748b" }}>
                <div style={{ fontSize: 32, marginBottom: 8 }}>📊</div>
                Нужно минимум 2 записи для графика
              </div>
            ) : (
              <>
                <div style={S.modalStats}>
                  <div style={S.mStatCard}><span style={S.mStatVal}>{data[0].maxWeight}кг</span><span style={S.mStatLbl}>Старт</span></div>
                  <div style={S.mStatCard}><span style={{ ...S.mStatVal, color: diff >= 0 ? "#22c55e" : "#ef4444" }}>{diff >= 0 ? "+" : ""}{diff}кг</span><span style={S.mStatLbl}>Прогресс</span></div>
                  <div style={S.mStatCard}><span style={{ ...S.mStatVal, color: "#f59e0b" }}>🏆 {record}кг</span><span style={S.mStatLbl}>Рекорд</span></div>
                </div>
                <p style={S.chartLabel}>Максимальный вес (кг)</p>
                <ResponsiveContainer width="100%" height={195}>
                  <LineChart data={data} margin={{ top: 8, right: 12, left: -18, bottom: 0 }}>
                    <defs><linearGradient id="lg2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor="#6366f1" /><stop offset="100%" stopColor="#a78bfa" /></linearGradient></defs>
                    <CartesianGrid strokeDasharray="3 3" stroke="#ffffff0d" />
                    <XAxis dataKey="date" tick={{ fill: "#94a3b8", fontSize: 11 }} axisLine={false} tickLine={false} />
                    <YAxis tick={{ fill: "#94a3b8", fontSize: 11 }} axisLine={false} tickLine={false} />
                    <Tooltip contentStyle={{ background: "#0f172a", border: "1px solid #6366f1", borderRadius: 12, color: "#f1f5f9", fontSize: 13 }} labelStyle={{ color: "#818cf8", fontWeight: 700 }} formatter={(v) => [`${v}кг`, "Вес"]} />
                    <ReferenceLine y={record} stroke="#f59e0b33" strokeDasharray="4 4" />
                    <Line type="monotone" dataKey="maxWeight" stroke="url(#lg2)" strokeWidth={3} dot={{ fill: "#6366f1", r: 5, strokeWidth: 2, stroke: "#0f172a" }} activeDot={{ r: 7 }} />
                  </LineChart>
                </ResponsiveContainer>
                <p style={{ ...S.chartLabel, marginTop: 10 }}>Все записи</p>
                {sortedHistory.map((e) => (
                  <div key={e.id} style={S.sessionRow}>
                    <span style={S.sessionDate}>{e.date}</span>
                    <div style={S.sessionSets}>
                      {e.setDetails.map((s, i) => (
                        <span key={i} style={S.sessionChip}><span style={{ color: "#6366f1", fontWeight: 700 }}>П{i + 1}</span> {s.weight}кг×{s.reps}</span>
                      ))}
                    </div>
                  </div>
                ))}
              </>
            )}
          </>
        )}
      </div>
    </div>
  );
}

  { key: "thighR",  label: "Обхват бедра П", unit: "см" },
];

function BodyTab({ bodyLogs, onAdd }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ weight: "", height: "", bicep: "", chest: "", waist: "", hips: "", thighL: "", thighR: "" });
  const [chartField, setChartField] = useState("weight");

  const chartData = [...bodyLogs]
    .sort((a, b) => a.date.localeCompare(b.date))
    .map((l) => ({ date: formatDate(l.date), value: l[chartField] }))
    .filter((d) => d.value);

  const latest = bodyLogs.length ? [...bodyLogs].sort((a, b) => b.date.localeCompare(a.date))[0] : null;

  const handleSave = () => {
    const entry = { id: Date.now(), date: today() };
    BODY_FIELDS.forEach(({ key }) => { entry[key] = parseFloat(form[key]) || null; });
    onAdd(entry);
    setForm({ weight: "", height: "", bicep: "", chest: "", waist: "", hips: "", thighL: "", thighR: "" });
    setShowForm(false);
  };

  return (
    <div style={S.scroll}>
      <button style={S.addBtn} onClick={() => setShowForm((p) => !p)}>
        {showForm ? "✕ Закрыть" : "+ Записать замеры"}
      </button>

      {showForm && (
        <div style={S.formCard}>
          <p style={{ ...S.sectionLabel, marginTop: 0 }}>Сегодняшние замеры</p>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px 12px" }}>
            {BODY_FIELDS.map(({ key, label, unit }) => (
              <div key={key}>
                <label style={{ ...S.label, display: "flex", alignItems: "center", gap: 5 }}>
                  <BodyIcon type={key} size={14}/> {label} ({unit})
                </label>
                <input style={S.input} type="number" inputMode="decimal" placeholder="—"
                  value={form[key]} onChange={(e) => setForm((p) => ({ ...p, [key]: e.target.value }))} />
              </div>
            ))}
          </div>
          <button style={{ ...S.saveBtn, marginTop: 12 }} onClick={handleSave}>Сохранить</button>
        </div>
      )}

      {latest && (
        <>
          <p style={S.sectionLabel}>Последние замеры · {formatDate(latest.date)}</p>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
            {BODY_FIELDS.map(({ key, label, unit }) => {
              if (!latest[key]) return null;
              const sorted = [...bodyLogs].sort((a, b) => a.date.localeCompare(b.date));
              const prevIdx = sorted.findIndex((l) => l.id === latest.id) - 1;
              const prev = sorted[prevIdx];
              const delta = prev && prev[key] ? +(latest[key] - prev[key]).toFixed(1) : null;
              return (
                <div key={key} style={S.bodyChip}>
                  <span style={S.bodyChipIcon}><BodyIcon type={key} size={22}/></span>
                  <div>
                    <p style={S.bodyChipLabel}>{label}</p>
                    <p style={S.bodyChipVal}>{latest[key]} {unit}
                      {delta !== null && <span style={{ fontSize: 11, color: delta > 0 ? "#22c55e" : delta < 0 ? "#ef4444" : "#64748b", marginLeft: 4 }}>
                        {delta > 0 ? "▲" : delta < 0 ? "▼" : "="}{Math.abs(delta)}
                      </span>}
                    </p>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {chartData.length >= 2 && (
        <>
          <p style={S.sectionLabel}>График</p>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>
            {BODY_FIELDS.filter(({ key }) => bodyLogs.some((l) => l[key])).map(({ key, label, icon }) => (
              <button key={key} style={{ ...S.exChip, ...(chartField === key ? S.exChipActive : {}), fontSize: 12, padding: "5px 10px" }}
                onClick={() => setChartField(key)}>{icon} {label.split(" ").pop()}</button>
            ))}
          </div>
          <div style={S.chartCard}>
            <p style={S.chartTitle}>{BODY_FIELDS.find((f) => f.key === chartField)?.label}</p>

              <LineChart data={chartData} margin={{ top: 8, right: 8, left: -20, bottom: 0 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#ffffff10" />
                <XAxis dataKey="date" tick={{ fill: "#94a3b8", fontSize: 11 }} axisLine={false} tickLine={false} />
                <YAxis tick={{ fill: "#94a3b8", fontSize: 11 }} axisLine={false} tickLine={false} />
                <Tooltip contentStyle={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 10, color: "#f1f5f9" }} />
                <Line type="monotone" dataKey="value" stroke="#22c55e" strokeWidth={2.5} dot={{ fill: "#22c55e", r: 4, stroke: "#0f172a", strokeWidth: 2 }} activeDot={{ r: 6 }} />
              </LineChart>
            </ResponsiveContainer>
          </div>
        </>
      )}

      {bodyLogs.length > 0 && (
        <>
          <p style={S.sectionLabel}>История</p>
          {[...bodyLogs].sort((a, b) => b.date.localeCompare(a.date)).map((log) => (
            <div key={log.id} style={{ ...S.logCard, flexDirection: "column", alignItems: "flex-start" }}>
              <p style={{ ...S.logName, marginBottom: 8 }}>📅 {formatDate(log.date)}</p>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {BODY_FIELDS.map(({ key, label, unit, icon }) => log[key]
                  ? <span key={key} style={S.bodyHistChip}>{icon} {log[key]}{unit}</span>
                  : null
                )}
              </div>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

function ChatTab({ messages, onSend, myRole }) {
  const [text, setText] = useState("");
  return (
    <div style={{ display: "flex", flexDirection: "column", flex: 1, overflow: "hidden" }}>
      <div style={{ flex: 1, overflowY: "auto", padding: "14px 20px 8px" }}>
        {messages.length === 0 && (
          <div style={{ textAlign: "center", padding: "40px 0", color: "#64748b" }}>
            <div style={{ fontSize: 32 }}>💬</div>
            <p style={{ marginTop: 8 }}>Начните переписку</p>
          </div>
        )}
        {messages.map((m, i) => {
          const isMine = m.from === myRole;
          return (
            <div key={i} style={{ display: "flex", justifyContent: isMine ? "flex-end" : "flex-start", marginBottom: 10 }}>
              <div style={{ ...S.bubble, ...(isMine ? S.bubbleMine : S.bubbleOther) }}>
                <p style={{ margin: 0, fontSize: 14, lineHeight: 1.45 }}>{m.text}</p>
                <p style={{ margin: "4px 0 0", fontSize: 10, color: isMine ? "#c7d2fe" : "#64748b", textAlign: "right" }}>{m.date}</p>
              </div>
            </div>
          );
        })}
      </div>
      <div style={S.chatInput}>
        <input style={S.chatField} placeholder="Написать сообщение..." value={text} onChange={(e) => setText(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && text.trim()) { onSend(text.trim()); setText(""); } }} />
        <button style={S.chatSend} onClick={() => { if (text.trim()) { onSend(text.trim()); setText(""); } }}>➤</button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// CLIENT APP
// ─────────────────────────────────────────────
function ClientApp({ isPro, trialRemaining, onShowPaywall, clientData, onUpdateClient }) {
  const [activeTab, setActiveTab] = useState("log");
  const [showForm, setShowForm] = useState(false);
  const [formName, setFormName] = useState("");
  const [formDate, setFormDate] = useState(today());
  const [numSets, setNumSets] = useState(4);
  const [setDetails, setSetDetails] = useState(Array.from({ length: 4 }, () => ({ reps: "", weight: "" })));
  const [modalExercise, setModalExercise] = useState(null);

  const { exercises, bodyLogs } = clientData;
  const { xp, levelInfo } = useMemo(() => {
    const xp = calcXP(exercises, bodyLogs);
    return { xp, levelInfo: getLevelInfo(xp) };
  }, [exercises, bodyLogs]);
  const { current: lvl, next, progress } = levelInfo;

  const uniqueExercises = [...new Set(exercises.map((e) => e.name))];
  const groupedByName = exercises.reduce((acc, e) => { if (!acc[e.name]) acc[e.name] = []; acc[e.name].push(e); return acc; }, {});

  const handleNumSetsChange = (n) => {
    const count = Math.max(1, Math.min(10, n));
    setNumSets(count);
    setSetDetails((prev) => Array.from({ length: count }, (_, i) => prev[i] || { reps: "", weight: "" }));
  };
  const updateSet = (i, field, val) => setSetDetails((prev) => prev.map((s, idx) => idx === i ? { ...s, [field]: val } : s));
  const handleAddEx = () => {
    if (!formName.trim()) return;
    const details = setDetails.map((s) => ({ reps: parseInt(s.reps) || 0, weight: parseFloat(s.weight) || 0 }));
    const entry = { id: Date.now(), name: formName.trim(), date: formDate || today(), setDetails: details };
    onUpdateClient({ exercises: [...exercises, entry] });
    setFormName(""); setFormDate(today()); setNumSets(4);
    setSetDetails(Array.from({ length: 4 }, () => ({ reps: "", weight: "" })));
    setShowForm(false);
  };
  const handleDeleteExercise = (name) => {
    onUpdateClient({ exercises: exercises.filter((e) => e.name !== name) });
  };

  const TABS = [
    { id: "log",  icon: "🏋️", label: "Тренировки" },
    { id: "body", icon: "📐", label: "Замеры" },
    { id: "hero", icon: "🏆", label: "Герой" },
  ];

  return (
    <>
      {modalExercise && (
        <ExerciseDetailModal
          name={modalExercise}
          exercises={exercises}
          onClose={() => setModalExercise(null)}
          onAddSession={(entry) => onUpdateClient({ exercises: [...exercises, entry] })}
        />
      )}

      {/* Top trial banner */}
      {!isPro && <TrialBanner remaining={trialRemaining} onUpgrade={onShowPaywall} />}

      {/* Top tab bar — same style as trainer */}
      <div style={S.tabRow}>
        {TABS.map((t) => (
          <button key={t.id} style={{ ...S.tab, ...(activeTab === t.id ? S.tabActive : {}) }} onClick={() => setActiveTab(t.id)}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>

      {/* ── ТРЕНИРОВКИ TAB */}
      {activeTab === "log" && (
        <div style={S.scroll}>
          <button style={S.addBtn} onClick={() => setShowForm((p) => !p)}>
            {showForm ? "✕ Закрыть" : "+ Добавить упражнение"}
          </button>
          {showForm && (
            <div style={S.formCard}>
              <div style={S.fieldGroup}>
                <label style={S.label}>Название упражнения</label>
                <input style={S.input} placeholder="Жим лёжа" value={formName} onChange={(e) => setFormName(e.target.value)} />
              </div>
              <div style={S.fieldGroup}>
                <label style={S.label}>📅 Дата тренировки</label>
                <input style={{ ...S.input, fontSize: 15 }} type="date" value={formDate} onChange={(e) => setFormDate(e.target.value)} />
              </div>
              <div style={S.fieldGroup}>
                <label style={S.label}>Количество подходов</label>
                <div style={S.stepperRow}>
                  <button style={S.stepBtn} onClick={() => handleNumSetsChange(numSets - 1)}>−</button>
                  <span style={S.stepVal}>{numSets}</span>
                  <button style={S.stepBtn} onClick={() => handleNumSetsChange(numSets + 1)}>+</button>
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6, width: "100%", boxSizing: "border-box" }}>
                <div style={{ width: 26, minWidth: 26, maxWidth: 26, flexShrink: 0 }} />
                <div style={{ flex: 1, minWidth: 0, textAlign: "center", fontSize: 10, color: "#64748b", fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase" }}>Вес (кг)</div>
                <div style={{ flex: 1, minWidth: 0, textAlign: "center", fontSize: 10, color: "#64748b", fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase" }}>Повторения</div>
              </div>
              {setDetails.map((s, i) => (
                <div key={i} style={S.setRow}>
                  <div style={S.setNumBadge}>{i + 1}</div>
                  <input style={S.setInput} type="number" inputMode="decimal" placeholder="80" value={s.weight} onChange={(e) => updateSet(i, "weight", e.target.value)} />
                  <input style={S.setInput} type="number" inputMode="numeric" placeholder="10" value={s.reps} onChange={(e) => updateSet(i, "reps", e.target.value)} />
                </div>
              ))}
              <button style={S.saveBtn} onClick={handleAddEx}>Сохранить</button>
            </div>
          )}

          {Object.keys(groupedByName).length === 0 && !showForm && (
            <div style={{ textAlign: "center", padding: "40px 0", color: "#64748b" }}>
              <div style={{ fontSize: 36 }}>🏋️</div>
              <p style={{ marginTop: 8, fontSize: 14 }}>Нет записей тренировок</p>
              <p style={{ fontSize: 12, color: "#475569", marginTop: 4 }}>Нажмите «+» чтобы добавить</p>
            </div>
          )}

          {Object.keys(groupedByName).length > 0 && (
            <>
              <p style={S.sectionLabel}>История · свайп влево чтобы удалить 📈</p>
              {Object.entries(groupedByName)
                .sort(([, a], [, b]) => b[b.length - 1].date.localeCompare(a[a.length - 1].date))
                .map(([name, entries]) => {
                  const latest = [...entries].sort((a, b) => b.date.localeCompare(a.date))[0];
                  const first  = [...entries].sort((a, b) => a.date.localeCompare(b.date))[0];
                  const diff   = entries.length > 1 ? +(maxWeightFn(latest) - maxWeightFn(first)).toFixed(1) : null;
                  const chartData = [...entries].sort((a, b) => a.date.localeCompare(b.date)).map((e) => ({ date: formatDate(e.date), w: maxWeightFn(e) }));
                  return (
                    <SwipeableCard key={name} onDelete={() => handleDeleteExercise(name)}>
                      <div style={{ ...S.exGroupCard, marginBottom: 0 }} onClick={() => setModalExercise(name)}>
                        <div style={S.exGroupHeader}>
                          <div>
                            <p style={S.exGroupName}>{name}</p>
                            <p style={S.exGroupMeta}>{entries.length} {entries.length === 1 ? "запись" : "записей"} · {formatDate(latest.date)}</p>
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            {diff !== null && <span style={{ ...S.badge, background: diff >= 0 ? "#22c55e18" : "#ef444418", color: diff >= 0 ? "#22c55e" : "#ef4444", fontSize: 12 }}>{diff >= 0 ? "+" : ""}{diff}кг</span>}
                            <span style={{ ...S.arrowIcon, fontSize: 16, color: "#64748b" }}>📈</span>
                          </div>
                        </div>
                        {chartData.length >= 2 && (
                          <div style={S.miniChart}>
                            <ResponsiveContainer width="100%" height={48}>
                              <LineChart data={chartData} margin={{ top: 4, right: 4, left: 4, bottom: 4 }}>
                                <Line type="monotone" dataKey="w" stroke="#6366f1" strokeWidth={2.5} dot={false} />
                              </LineChart>
                            </ResponsiveContainer>
                          </div>
                        )}
                        <div style={S.logSetsGrid}>
                          {latest.setDetails.map((s, i) => (
                            <div key={i} style={S.logSetChip}>
                              <span style={S.logSetNum}>П{i + 1}</span>
                              <span style={S.logSetWeight}>{s.weight}кг</span>
                              <span style={S.logSetReps}>×{s.reps}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    </SwipeableCard>
                  );
                })}
            </>
          )}
        </div>
      )}

      {/* ── ЗАМЕРЫ TAB */}
      {activeTab === "body" && (
        <BodyTab
          bodyLogs={bodyLogs}
          onAdd={(entry) => onUpdateClient({ bodyLogs: [...bodyLogs, entry] })}
        />
      )}

      {/* ── ГЕРОЙ TAB */}
      {activeTab === "hero" && (
        <div style={S.scroll}>
          {/* Character card */}
          <div style={S.heroCard}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 4 }}>
              <div>
                <p style={{ ...S.heroTitle, color: lvl.color }}>Уровень {lvl.level} · {lvl.title}</p>
                <p style={S.heroXP}>{xp} XP {next ? `/ ${next.xpNeeded} XP` : "· МАКС"}</p>
              </div>
              {isPro && <span style={S.proBadgeSmall}>PRO</span>}
            </div>
            <div style={S.xpTrack}>
              <div style={{ ...S.xpFill, width: `${progress * 100}%`, background: lvl.color }} />
            </div>
            {next && <p style={{ fontSize: 11, color: "#475569", marginTop: 4 }}>До уровня {next.level}: ещё {next.xpNeeded - xp} XP</p>}
            <div style={{ display: "flex", justifyContent: "center", margin: "16px 0 8px", position: "relative" }}>
              <Character level={lvl.level}/>
              <div style={{ position: "absolute", top: 0, right: 20, background: lvl.color, borderRadius: 10, padding: "3px 9px", fontSize: 13, fontWeight: 800, color: "#fff" }}>
                Lv.{lvl.level}
              </div>
            </div>
            <div style={S.levelHint}>
              <p style={S.levelHintTitle}>Как набирать XP:</p>
              <p style={S.levelHintText}>+1 XP за каждый кг максимального веса · +20 XP за запись замеров тела</p>
            </div>
          </div>

          <p style={S.sectionLabel}>Достижения</p>
          <div style={S.statsRow}>
            <div style={S.statCard}><span style={S.statVal}>{exercises.length}</span><span style={S.statLbl}>Тренировок</span></div>
            <div style={S.statCard}><span style={S.statVal}>{uniqueExercises.length}</span><span style={S.statLbl}>Упражнений</span></div>
            <div style={S.statCard}><span style={S.statVal}>{bodyLogs.length}</span><span style={S.statLbl}>Замеров</span></div>
          </div>

          <p style={S.sectionLabel}>Путь развития</p>
          {LEVELS.map((l) => {
            const reached = xp >= l.xpNeeded;
            return (
              <div key={l.level} style={{ ...S.levelRoadRow, ...(reached ? S.levelRoadReached : {}) }}>
                <div style={{ ...S.levelRoadDot, background: reached ? l.color : "#1e293b", borderColor: reached ? l.color : "#334155" }}>
                  {reached ? "✓" : l.level}
                </div>
                <div style={{ flex: 1 }}>
                  <p style={{ ...S.levelRoadTitle, color: reached ? l.color : "#475569" }}>Уровень {l.level} · {l.title}</p>
                  <p style={S.levelRoadXP}>{l.xpNeeded} XP</p>
                </div>
                {lvl.level === l.level && <span style={{ fontSize: 16 }}>👈</span>}
              </div>
            );
          })}
        </div>
      )}
    </>
  );
}

    setSetDetails((prev) => Array.from({ length: count }, (_, i) => prev[i] || { reps: "", weight: "" }));
  };
  const updateSet = (i, field, val) =>
    setSetDetails((prev) => prev.map((s, idx) => idx === i ? { ...s, [field]: val } : s));

    if (!formName.trim()) return;
    const details = setDetails.map((s) => ({ reps: parseInt(s.reps) || 0, weight: parseFloat(s.weight) || 0 }));

    setFormName(""); setFormDate(today()); setNumSets(3);
    setSetDetails(Array.from({ length: 3 }, () => ({ reps: "", weight: "" })));
    setShowForm(false);
  };

    if (!acc[e.name]) acc[e.name] = [];
    acc[e.name].push(e);
    return acc;
  }, {});

  return (
    <div style={S.scroll}>

        <div style={S.formCard}>

              style={S.input}
              placeholder="Жим лёжа, Присед, Тяга..."

            <label style={S.label}>📅 Дата тренировки</label>

const INVOICE_API_URL = "https://YOUR_BACKEND.com/api/create-invoice";

// ─────────────────────────────────────────────
// STORAGE BRIDGE
// CloudStorage survives cache clears — data lives on Telegram servers
// Falls back to localStorage for browser testing
// ─────────────────────────────────────────────
const storage = {
  get: (key) => new Promise((resolve) => {
    if (twa?.CloudStorage) {
      twa.CloudStorage.getItem(key, (err, val) =>
        resolve(!err && val !== undefined && val !== "" ? val : null)
      );
    } else {
      try { resolve(localStorage.getItem(key)); } catch { resolve(null); }
    }
  }),

  set: (key, value) => new Promise((resolve) => {
    if (twa?.CloudStorage) {
      twa.CloudStorage.setItem(key, value, () => resolve());
    } else {
      try { localStorage.setItem(key, value); } catch {}
      resolve();
    }
  }),

  remove: (key) => new Promise((resolve) => {
    if (twa?.CloudStorage) {
      twa.CloudStorage.removeItem(key, () => resolve());
    } else {
      try { localStorage.removeItem(key); } catch {}
      resolve();
    }
  }),
};

// ─────────────────────────────────────────────
// DATE HELPERS
// ─────────────────────────────────────────────
const todayStr = today; // alias — same function, unified naming

const daysBetween = (a, b = todayStr()) => {
  const msA = new Date(a).getTime();
  const msB = new Date(b).getTime();
  return Math.floor((msB - msA) / 86400000);
};

const addDays = (dateStr, n) => {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + n);
  return d.toISOString().split("T")[0];
};

const trialDaysLeft = (startDateStr) =>
  Math.max(0, TRIAL_DAYS - daysBetween(startDateStr));

const EMPTY_CLIENT_DATA = { exercises: [], bodyLogs: [], messages: [] };
const EMPTY_CLIENTS = [];

// ─────────────────────────────────────────────
function App() {
  const [role, setRole]                     = useState(null);
  const [loaded, setLoaded]                 = useState(false);
  const [trialStartDate, setTrialStartDate] = useState(null);  // "YYYY-MM-DD"
  const [isPro, setIsPro]                   = useState(false);
  const [proExpireDate, setProExpireDate]   = useState(null);  // "YYYY-MM-DD"
  const [showPaywall, setShowPaywall]       = useState(false);
  const [showUpgradeSuccess, setShowUpgradeSuccess] = useState(false);
  const [clientData, setClientData]         = useState(EMPTY_CLIENT_DATA);
  const [clients, setClients]               = useState(EMPTY_CLIENTS);
  const [selectedClientId, setSelectedClientId] = useState(null);
  const [showAddClient, setShowAddClient]   = useState(false);

  // ── Initialize Telegram Mini App UI on mount
  useEffect(() => {
    if (!twa) return;
    twa.ready();                                      // Signal app is ready
    twa.expand();                                     // Full-screen
    twa.setHeaderColor("#0a0a0a");                    // Dark header
    twa.setBackgroundColor("#0a0a0a");                // Dark background
    twa.enableClosingConfirmation();                  // Confirm before close
    if (twa.disableVerticalSwipes) twa.disableVerticalSwipes(); // No accidental close on swipe
  }, []);

  // ── Load all data on mount, check subscription expiry
  useEffect(() => {
    const loadAll = async () => {
      try {
        // Read each key independently — one failure doesn't block others
        const [tsd, pro, expDate, cd, cl] = await Promise.all([
          storage.get("gt_trialStartDate"),
          storage.get("gt_isPro"),
          storage.get("gt_proExpireDate"),
          storage.get("gt_clientData"),
          storage.get("gt_clients"),
        ]);

        if (tsd) setTrialStartDate(tsd);

        // Parse subscription — check expiry immediately on load
        const proActive = pro === "true";
        const expiredSub = proActive && expDate && daysBetween(expDate) > 0;
        if (expiredSub) {
          // Subscription expired — reset only subscription keys, keep clientData intact
          await Promise.all([
            storage.set("gt_isPro", "false"),
            storage.remove("gt_proExpireDate"),
          ]);
          setIsPro(false);
          setProExpireDate(null);
        } else {
          setIsPro(proActive);
          if (expDate) setProExpireDate(expDate);
        }

        // clientData and clients are loaded independently — untouched by subscription reset
        if (cd)  setClientData(JSON.parse(cd));
        if (cl)  setClients(JSON.parse(cl));
      } catch {}
      setLoaded(true);
    };
    loadAll();
  }, []);

  // ── Persist each key independently (only after initial load)
  useEffect(() => {
    if (!loaded || !trialStartDate) return;
    storage.set("gt_trialStartDate", trialStartDate);
  }, [trialStartDate, loaded]);

  useEffect(() => {
    if (!loaded) return;
    storage.set("gt_isPro", isPro ? "true" : "false");
  }, [isPro, loaded]);

  useEffect(() => {
    if (!loaded || !proExpireDate) return;
    storage.set("gt_proExpireDate", proExpireDate);
  }, [proExpireDate, loaded]);

  // clientData and clients written independently — subscription changes never touch them
  useEffect(() => {
    if (!loaded) return;
    storage.set("gt_clientData", JSON.stringify(clientData));
  }, [clientData, loaded]);

  useEffect(() => {
    if (!loaded) return;
    storage.set("gt_clients", JSON.stringify(clients));
  }, [clients, loaded]);

  // ── Telegram BackButton — shows when inside a sub-screen
  useEffect(() => {
    if (!twa?.BackButton) return;
    const isSubScreen = !!(role && (selectedClientId || showPaywall));
    if (isSubScreen) {
      twa.BackButton.show();
      const handler = () => {
        if (selectedClientId) { setSelectedClientId(null); return; }
        if (showPaywall) { setShowPaywall(false); return; }
        if (role) setRole(null);
      };
      twa.BackButton.onClick(handler);
      return () => twa.BackButton.offClick(handler);
    } else {
      twa.BackButton.hide();
    }
  }, [role, selectedClientId, showPaywall]);

  // MainButton wired after handleBuySubWithStars is declared (see below)

  // ── Notify HTML to remove boot screen
  useEffect(() => {
    if (loaded && typeof window.__onAppMount === "function") {
      window.__onAppMount();
    }
  }, [loaded]);

  // ── Loading screen — shown while reading CloudStorage
  if (!loaded) return (
    <div style={{ ...S.splash, flexDirection: "column", gap: 16 }}>
      <div style={{ fontSize: 48 }}>💪</div>
      <p style={{ color: "#888", fontSize: 15 }}>Загрузка...</p>
    </div>
  );

  // ── Trial / paywall logic (date-based)
  const remaining    = trialStartDate ? trialDaysLeft(trialStartDate) : TRIAL_DAYS;
  const trialExpired = !!trialStartDate && remaining === 0 && !isPro;

  const enterRole = (r) => {
    if (!trialStartDate) setTrialStartDate(todayStr()); // fix first-launch date once
    setRole(r);
  };

  // ── Activate Pro locally (called after confirmed payment)
  const activatePro = useCallback(() => {
    const expire = addDays(todayStr(), 30);
    storage.set("gt_isPro", "true");
    storage.set("gt_proExpireDate", expire);
    setIsPro(true);
    setProExpireDate(expire);
    setShowPaywall(false);
    setShowUpgradeSuccess(true);
  }, []);

  // ── Full Stars payment flow
  const handleBuySubWithStars = useCallback(async () => {
    if (twa) {
      try {
        twa.MainButton?.showProgress(false);

        // Try to get a real invoice link from backend
        let invoiceLink = null;
        try {
          const resp = await fetch(INVOICE_API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              user_id: twa.initDataUnsafe?.user?.id,
              plan: "pro_30d",
            }),
          });
          if (resp.ok) {
            const data = await resp.json();
            invoiceLink = data.invoice_link;
          }
        } catch {
          // Backend not configured — fall through to popup stub
        }

        twa.MainButton?.hideProgress();

        if (invoiceLink) {
          // Real Telegram Stars payment
          twa.openInvoice(invoiceLink, (status) => {
            if (status === "paid") {
              activatePro();
              twa.showAlert("🎉 Pro активирован! Спасибо за поддержку.");
            } else if (status === "failed") {
              twa.showAlert("Ошибка оплаты. Попробуйте ещё раз.");
            }
            // "cancelled" — do nothing
          });
        } else {
          // Stub popup when backend is not yet connected
          twa.showPopup(
            {
              title: "GymTrack Pro — 250 ★",
              message: "Оплата через Telegram Stars.\n\n⚠️ Backend не подключён — активируем тестово.\n\nДля реальной оплаты подключите сервер в INVOICE_API_URL.",
              buttons: [
                { id: "pay",    type: "default", text: "✅ Активировать (тест)" },
                { id: "cancel", type: "cancel" },
              ],
            },
            (btnId) => { if (btnId === "pay") activatePro(); }
          );
        }
      } catch {
        twa.MainButton?.hideProgress();
        twa.showAlert("Что-то пошло не так. Попробуйте позже.");
      }
    } else {
      // Browser testing
      if (window.confirm("🧪 Тест: симулировать покупку Pro за 250 ★ (30 дней)?")) {
        activatePro();
      }
    }
  }, [activatePro]);

  const handleUpgrade = handleBuySubWithStars;

  // ── Telegram MainButton — shown on paywall, triggers payment
  useEffect(() => {
    if (!twa?.MainButton) return;
    if (showPaywall && !isPro) {
      twa.MainButton.setParams({
        text: "Активировать Pro за 250 ★",
        color: "#f97316",
        text_color: "#ffffff",
        is_active: true,
        is_visible: true,
      });
      twa.MainButton.onClick(handleBuySubWithStars);
      return () => {
        twa.MainButton.offClick(handleBuySubWithStars);
        twa.MainButton.hide();
      };
    } else {
      twa.MainButton.hide();
    }
  }, [showPaywall, isPro, handleBuySubWithStars]);

  const updateClientData = (patch) => setClientData((prev) => ({ ...prev, ...patch }));
  const updateTrainerClient = (id, patch) => setClients((prev) =>
    prev.map((c) => c.id === id ? { ...c, ...patch } : c)

              color: r === "Клиент" ? "#fff" : "#888",
              fontSize: 10, fontWeight: 800, letterSpacing: 1,
              padding: "3px 10px", borderRadius: 8,
              marginBottom: 14, textTransform: "uppercase",
              flexShrink: 0,
            }}>
              {chip}
            </span>

            {/* Description — fixed min-height */}
            <span style={{
              color: "#666", fontSize: 12, lineHeight: 1.5,
              minHeight: 36,
            }}>
              {desc}
            </span>
          </button>
        ))}
      </div>
    </div>
  );

  // ── TRAINER → client detail
  if (role === "Тренер" && selectedClientId) {
    const client = clients.find((c) => c.id === selectedClientId);
    return (
      <div style={S.phone}>
        {showPaywall && <PaywallScreen onUpgrade={handleUpgrade} onClose={() => setShowPaywall(false)} trialExpired={trialExpired} />}
        {showUpgradeSuccess && <UpgradeSuccessModal onClose={() => setShowUpgradeSuccess(false)} />}
        <TrainerClientDetail
          client={client}
          onBack={() => setSelectedClientId(null)}
          onUpdateClient={updateTrainerClient}
        />
      </div>
    );
  }

  // ── TRAINER → client list
  if (role === "Тренер") return (
    <div style={S.phone}>
      {showPaywall && <PaywallScreen onUpgrade={handleUpgrade} onClose={() => setShowPaywall(false)} trialExpired={trialExpired} />}
      {showUpgradeSuccess && <UpgradeSuccessModal onClose={() => setShowUpgradeSuccess(false)} />}
      {showAddClient && <AddClientModal onClose={() => setShowAddClient(false)} onAdd={(c) => setClients((p) => [...p, c])} />}

      <div style={S.header}>
        <button style={S.backBtn} onClick={() => setRole(null)}>←</button>
        <span style={S.headerTitle}>Мои клиенты</span>
        {isPro
          ? <span style={S.proBadgeSmall}>PRO</span>
          : <button style={S.trialChipBtn} onClick={() => setShowPaywall(true)}>🎁 {remaining} дн.</button>}
      </div>
      <div style={S.scroll}>
        {!isPro && <TrialBanner remaining={remaining} onUpgrade={() => setShowPaywall(true)} />}
        {isPro && <div style={{ ...S.trialBanner, background: "#14532d22", borderColor: "#22c55e33" }}><span style={{ fontSize: 13, color: "#22c55e", fontWeight: 600 }}>✓ Pro · полный доступ</span></div>}
        <p style={S.sectionLabel}>Клиенты · свайп влево чтобы удалить</p>
        {clients.map((c) => {
          const xp = calcXP(c.exercises, c.bodyLogs);
          const { current: lvl } = getLevelInfo(xp);
          const lastEx = c.exercises.length ? [...c.exercises].sort((a, b) => b.date.localeCompare(a.date))[0] : null;
          return (
            <SwipeableCard key={c.id} onDelete={() => setClients((prev) => prev.filter((x) => x.id !== c.id))}>
              <div style={{ ...S.clientCard, marginBottom: 0 }} onClick={() => setSelectedClientId(c.id)}>
                <div style={S.clientAvatar}>{c.avatar}</div>
                <div style={S.clientInfo}>
                  <p style={S.clientName}>{c.name}</p>
                  <p style={S.clientPlan}>{c.plan} · <span style={{ color: lvl.color }}>Lv.{lvl.level} {lvl.title}</span></p>
                  {lastEx && <p style={S.clientLast}>📋 {lastEx.name} · {formatDate(lastEx.date)}</p>}
                </div>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                  <Character level={lvl.level}/>
                </div>
              </div>
            </SwipeableCard>
          );
        })}
        <button style={S.addClientBtn} onClick={() => setShowAddClient(true)}>+ Добавить клиента</button>
      </div>
    </div>
  );

  // ── CLIENT
  return (
    <div style={{ ...S.phone, paddingBottom: 64 }}>
      {showPaywall && <PaywallScreen onUpgrade={handleUpgrade} onClose={() => setShowPaywall(false)} trialExpired={trialExpired} />}
      {showUpgradeSuccess && <UpgradeSuccessModal onClose={() => setShowUpgradeSuccess(false)} />}

      <div style={S.header}>
        <button style={S.backBtn} onClick={() => setRole(null)}>←</button>
        <span style={S.headerTitle}>GymTrack</span>
        {isPro
          ? <span style={S.proBadgeSmall}>PRO</span>
          : <button style={S.trialChipBtn} onClick={() => setShowPaywall(true)}>🎁 {remaining} дн.</button>}
      </div>

      <ClientApp
        isPro={isPro}
        trialRemaining={remaining}
        onShowPaywall={() => setShowPaywall(true)}
        clientData={clientData}
        onUpdateClient={updateClientData}
      />
    </div>
  );
}
